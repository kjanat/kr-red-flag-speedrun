name: Deploy to GitHub Pages
run-name: 'Deploy "${{ github.event.head_commit.message }}" by @${{ github.actor }}'
on: { push: { branches: [master], paths-ignore: ["*.md"] } }
permissions: { contents: read, pages: write, id-token: write }
concurrency: { group: pages, cancel-in-progress: false }
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      { name: github-pages, url: "${{ steps.deployment.outputs.page_url }}" }
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun bd
      - { uses: actions/upload-pages-artifact@v4, with: { path: build/ } }
      - { uses: actions/deploy-pages@v4, id: deployment }
